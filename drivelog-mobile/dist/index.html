<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="/m/manifest.json" />
  <link rel="apple-touch-icon" href="/m/icon-192.png" />
  <title>DriveLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- 카카오맵 SDK -->
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b1e43fe40464bf365f6122749187c09a&libraries=services&autoload=false"></script>
  <script type="module" crossorigin src="/m/assets/index-DJIuLk86.js"></script>
  <link rel="stylesheet" crossorigin href="/m/assets/index-BeuupY8l.css">
</head>
<body>
  <div id="root"></div>
  <script>
    // ============================================================
    // Service Worker 등록 + 자동 업데이트 감지 (2026-04-27)
    // ----
    // - 60분마다 registration.update() 호출 → 새 sw.js 발견 시 자동 다운로드
    // - 새 SW가 설치 완료(state='installed') 되면 window 이벤트로 App.jsx에 알림
    // - App.jsx의 토스트가 사용자 동의 받아 SW에 SKIP_WAITING 메시지 전송 후 reload
    // ============================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/m/sw.js', { scope: '/m/' });

          // 새 SW가 발견되어 설치 중일 때
          registration.addEventListener('updatefound', () => {
            const newSW = registration.installing;
            if (!newSW) return;

            newSW.addEventListener('statechange', () => {
              // 'installed'이면서 controller가 있으면 = 기존 SW 위에 새 SW가 대기 중
              // (controller가 없으면 = 첫 설치 = 알릴 필요 없음)
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                window.dispatchEvent(new CustomEvent('drivelog:sw-update-ready'));
              }
            });
          });

          // 60분마다 update 체크 (앱이 백그라운드에 살아있을 때도 새 버전 감지)
          setInterval(() => {
            registration.update().catch(() => {});
          }, 60 * 60 * 1000);

          // 페이지 visibility 복귀 시에도 한 번 체크 (앱 다시 포커스했을 때)
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
              registration.update().catch(() => {});
            }
          });
        } catch (err) {
          console.warn('[sw] 등록 실패:', err);
        }
      });

      // 새 SW가 활성화되어 페이지 제어권을 잡으면 자동 reload
      // (App.jsx에서 SKIP_WAITING 메시지를 보낸 직후 트리거됨)
      let reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloading) return;
        reloading = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
