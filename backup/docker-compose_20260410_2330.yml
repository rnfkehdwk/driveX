version: '3.8'

# DriveLog Full Stack - Docker Compose
# 실행: docker-compose up -d
# 종료: docker-compose down
# 로그: docker-compose logs -f
#
# ⚠️ 중요: api 서비스의 volumes 섹션은 절대 삭제하지 말 것!
#   - ./server:/app  → 호스트의 server 코드를 컨테이너에 마운트 (deploy:server 동작에 필수)
#   - /app/node_modules → node_modules는 컨테이너 내부 볼륨 사용 (호스트와 분리)
# 이 두 줄이 빠지면 컨테이너가 이미지에 박힌 옛날 코드를 실행하게 됩니다.
#
# 마지막 검증: 2026-04-09 (NAS 실 운영 환경 동기화)

services:
  # ---- MariaDB ----
  db:
    image: mariadb:10.11
    container_name: drivelog-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-DriveLog2026!}
      MYSQL_DATABASE: drivelog_db
      MYSQL_USER: drivelog
      MYSQL_PASSWORD: ${DB_PASSWORD:-DriveLog_DB_2026!}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/db/drivelog_setup.sql:/docker-entrypoint-initdb.d/01_setup.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Express API Server ----
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: drivelog-api
    restart: always
    volumes:
      # ⚠️ 절대 삭제 금지! 호스트 server 코드 → 컨테이너 /app 마운트
      - ./server:/app
      # node_modules는 컨테이너 내부 볼륨 사용 (호스트와 분리)
      - /app/node_modules
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: sykim
      DB_PASSWORD: ${DB_PASSWORD:-DriveLog_DB_2026!}
      DB_NAME: drivelog_db
      DB_CONNECTION_LIMIT: 20
      JWT_SECRET: ${JWT_SECRET:-change_me_to_64_char_random_string_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_to_another_64_char_random_string}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      BCRYPT_ROUNDS: 12
      LOGIN_MAX_ATTEMPTS: 5
      LOGIN_LOCK_MINUTES: 30
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 200
      # SMTP (Gmail) - 2026-04-09 추가
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      # PII Encryption (2026-04-10 추가)
      # ⚠️ PII_ENC_KEY 분실 시 암호화된 데이터 영구 복구 불가
      # 64자 hex (32바이트). 별도 안전한 곳에 백업 필수.
      PII_ENC_KEY: ${PII_ENC_KEY}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Nginx (Reverse Proxy + Static Serving) ----
  nginx:
    image: nginx:alpine
    container_name: drivelog-nginx
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./client/dist:/usr/share/nginx/html/admin:ro
      - ./mobile/dist:/usr/share/nginx/html/mobile:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

volumes:
  db_data:
    driver: local
